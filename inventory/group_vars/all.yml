---
# 全局变量文件，对 hosts.yml 中所有主机生效。
# 主机级变量（hosts.yml 中单台主机下定义的变量）优先级更高，会覆盖此处同名变量。

# ── 公共路径 ──────────────────────────────────────────────────────────────────
# 所有 Docker Compose 栈的根目录，各服务的配置/数据子目录均挂载于此
docker_root: /opt/docker

# 跨 Compose 栈互通的共享 overlay 网络，需在各主机上提前创建
docker_network_name: global_gateway

# ── MySQL 主从拓扑 ────────────────────────────────────────────────────────────
# 主库：gz-03，接受写入
mysql_master_host: "{{ hostvars[groups['db_master_nodes'][0]].ansible_host }}"
# 实时从库：gz-02，用于读负载分担
mysql_replica_realtime_host: "{{ hostvars[groups['db_realtime_replica_nodes'][0]].ansible_host }}"
# 延迟从库：bj-01，延迟 1 小时，用于误操作回档
mysql_replica_delay_host: "{{ hostvars[groups['db_delay_replica_nodes'][0]].ansible_host }}"
mysql_port: 3306

# ── ProxySQL ──────────────────────────────────────────────────────────────────
# 部署在 gz-03，对应用透明地做读写分离
proxysql_host: "{{ hostvars[groups['db_proxy_nodes'][0]].ansible_host }}"
proxysql_mysql_port: 6033  # 应用连接此端口，ProxySQL 路由到主/从
proxysql_admin_port: 6032  # ProxySQL 管理界面端口

# ── Redis Sentinel 主从拓扑 ───────────────────────────────────────────────────
# 主节点：gz-03；从节点：gz-02、bj-01；Sentinel 部署在全部 4 台主机
redis_master_host: "{{ hostvars[groups['redis_master_nodes'][0]].ansible_host }}"
redis_sentinel_hosts: "{{ groups['redis_master_nodes'] + groups['redis_replica_nodes'] }}"
redis_port: 6379
redis_sentinel_port: 26379
redis_sentinel_master_name: mymaster  # Sentinel 监控的主节点别名，客户端通过此名称发现主节点

# ── 应用服务 ──────────────────────────────────────────────────────────────────
# RuoYi 后端服务监听端口（部署在 gz-02、gz-03 两个 app_nodes）
ruoyi_port: 8080

# ── 监控组件端口 ──────────────────────────────────────────────────────────────
node_exporter_port: 9100    # 主机指标采集，部署在全部 4 台主机
mysqld_exporter_port: 9104  # MySQL 指标采集，部署在 gz-02、gz-03、bj-01
grafana_port: 3000          # Grafana 可视化面板，部署在 gz-01
prometheus_port: 9090        # Prometheus 监控，部署在 gz-01

# ── 告警链路（gz-01 Prometheus → bj-01 Alertmanager → 飞书）────────────────────
# Alertmanager 与 prometheus-alert 均部署在 bj-01；Webhook 真值在 vault
alertmanager_port: 9093
alertmanager_host: "{{ hostvars[groups['alertmanager_nodes'][0]].ansible_host }}"
alertmanager_external_url: "http://{{ alertmanager_host }}:{{ alertmanager_port }}"

# prometheus-alert：将 Alertmanager Webhook 转为飞书消息格式（与 RuoYi 8080 无关）
prometheus_alert_port: 8080
prometheus_alert_image: "feiyu563/prometheus-alert:v4.9.2"

# Blackbox Exporter：HTTP/TCP 等探测，供 Prometheus 抓取 blackbox 模块
blackbox_exporter_port: 9115
blackbox_exporter_image: "prom/blackbox-exporter:v0.25.0"

# Alertmanager 全局路由：同组告警合并等待、组内再次评估间隔、重复通知间隔
alert_repeat_interval: 4h
alert_group_wait: 30s
alert_group_interval: 5m

# Prometheus 告警规则阈值（见 roles/monitor-stack/templates/rules/*.j2）
alert_disk_free_percent_critical: 15              # 根分区可用空间低于此百分比触发严重告警
alert_inode_free_percent_warning: 15              # 根分区 inode 可用率低于此百分比触发警告
alert_memory_available_percent_warning: 10        # MemAvailable / MemTotal 低于此百分比触发警告
alert_cpu_usage_percent_warning: 85               # 5m 平均非 idle CPU 高于此百分比触发警告
alert_mysql_realtime_replica_lag_seconds_warning: 60   # gz-02 实时从复制延迟（秒）
alert_mysql_delay_replica_lag_seconds_warning: 3900    # bj-01 延迟从复制延迟（秒），高于 1h 设计值留余量防误报

# ── 私有镜像仓库 ──────────────────────────────────────────────────────────────
# Registry 部署在 bj-01；推送/拉取侧 insecure-registries 由各节点主机变量合并
registry_host: "{{ hostvars[groups['registry_nodes'][0]].ansible_host }}:{{ registry_port }}"
registry_port: 5000
registry_image_tag: "registry:2"

# ── 应用镜像版本 ──────────────────────────────────────────────────────────────
# 推送到私有仓库后的仓库内名称与 tag；完整拉取地址由 Compose 模板拼接 registry_host
ruoyi_image_name: "ruoyi"
ruoyi_image_tag: "latest"

# ── 组件镜像版本 (V1.7 收敛) ──────────────────────────────────────────────────
# 历史 role 模板内硬编码的镜像 tag 统一收敛至此，命名沿用 V1.7 已落地的
# `<component>_image` 约定（参考 prometheus_alert_image / blackbox_exporter_image）；
# 同 role 内多次出现的同一镜像（redis master+sentinel、mysql 主从、nginx 入口+
# diary-assets）共用同一变量，避免升级时漏改其中一处导致协议版本错配。
# registry_image_tag / ruoyi_image_* 命名风格不同但被 Jenkins/runbook 多处引用，
# 留作存量，v1.12 CI/CD IaC 化时顺带统一。
prometheus_image:      "prom/prometheus:v2.53.0"
grafana_image:         "grafana/grafana:11.0.0"
alertmanager_image:    "prom/alertmanager:v0.27.0"
node_exporter_image:   "prom/node-exporter:v1.8.0"
mysqld_exporter_image: "prom/mysqld-exporter:v0.15.1"
nginx_image:           "nginx:1.27-alpine"
redis_image:           "redis:7.2-alpine"
mysql_image:           "mysql:8.0"
proxysql_image:        "proxysql/proxysql:latest"
memos_image:           "neosmemo/memos:0.26"
jenkins_image:         "jenkins-ansible:latest"

# ── MySQL 逻辑备份 (V1.7) ──────────────────────────────────────────────────────────────
# 由 playbooks/setup_backup.yml 下发至 db_master_nodes / ops_nodes：mysqldump、本地轮转、ossutil 上传 OSS
mysql_backup_database: "ry-vue"
mysql_backup_dir: "{{ docker_root }}/backup/mysql"       # 宿主机上备份文件与脚本目录
mysql_backup_retention_days: 3                         # 本地保留天数，过期由备份脚本清理
mysql_backup_cron_hour: "2"
mysql_backup_cron_minute: "0"                          # 默认每天 02:00 执行（宿主机本地时区）
mysql_backup_oss_prefix: "docker-infra/mysql/ruoyi"  # OSS 对象键前缀，与 Bucket 组合成完整路径

# 阿里云 ossutil（逻辑备份上传 OSS 用；AccessKey 等敏感项在 vault）
ossutil_version: "1.7.18"
ossutil_install_dir: /usr/local/bin

# Prometheus 主机 IP，用于 Prometheus 抓取指标
prometheus_host: "{{ hostvars[groups['monitor_nodes'][0]].ansible_host }}"

# Diary 主机 IP，用于反向代理
diary_host: "{{ hostvars[groups['diary_nodes'][0]].ansible_host }}"
# 用于访问 Diary 的静态资源
diary_assets_port: 5231 

# Grafana 主机 IP，用于反向代理
grafana_host: "{{ hostvars[groups['monitor_nodes'][0]].ansible_host }}"

# Jenkins 主机 IP，用于反向代理
jenkins_host: "{{ hostvars[groups['ops_nodes'][0]].ansible_host }}"
