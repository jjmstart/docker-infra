# =============================================================
# Sentinel 配置文件 - 哨兵节点 1
# 节点：ops-lab-gz-03（广州·腾讯云 4C8G）
# 角色：哨兵集群成员，监控 Master 健康状态，参与故障切换投票
# 重要：此文件在 Sentinel 启动后会被自动改写，追加已发现的 Slave 和
#       其他 Sentinel 地址，属于正常行为，请勿手动还原。
# =============================================================

# port：Sentinel 监听的端口，与 Redis 数据端口（6379）分开，避免混淆。
port 26379

# sentinel announce-ip：向其他 Sentinel 声明本节点对外可达的 IP。
# 原理与 replica-announce-ip 相同：Sentinel 容器使用 network_mode: host，
# 直接绑定宿主机网络，此处填写 Tailscale 内网 IP 使其他节点能找到本哨兵。
sentinel announce-ip 100.92.5.116
sentinel announce-port 26379

# sentinel monitor：声明要监控的 Master 节点。
# 格式：sentinel monitor <master-name> <master-ip> <master-port> <quorum>
# master-name：集群名称，客户端通过此名称向 Sentinel 查询当前 Master 地址。
# quorum（法定人数）：判定 Master 客观下线（ODOWN）所需的最少哨兵投票数。
# 设为 2：3 个哨兵中至少 2 个认为 Master 宕机，才会触发故障切换，
# 防止网络抖动导致的误切换（split-brain 问题）。
sentinel monitor mymaster 100.92.5.116 6379 2

# sentinel auth-pass：连接 Master/Slave 时使用的认证密码，需与 requirepass 一致。
sentinel auth-pass mymaster <ROTATED_REDIS_PASSWORD>

# sentinel down-after-milliseconds：主观下线超时时间（毫秒）。
# Sentinel 向 Master 发送 PING，超过此时间无响应，则将其标记为主观下线（SDOWN）。
# 单个哨兵的 SDOWN 不会触发切换；达到 quorum 数量的哨兵都 SDOWN 后升级为客观下线（ODOWN）。
# 设为 5000ms（5秒），在网络抖动容忍度和故障响应速度之间取平衡。
sentinel down-after-milliseconds mymaster 5000

# sentinel failover-timeout：故障切换超时时间（毫秒）。
# 包括：选举新 Master、通知 Slave 切换复制源、等待 Slave 同步完成等全流程。
# 若超时，当前 Sentinel 放弃本次故障切换，等待下一轮重试（超时时间翻倍）。
sentinel failover-timeout mymaster 30000

# sentinel parallel-syncs：故障切换时，允许同时向新 Master 发起全量同步的 Slave 数量。
# 设为 1：每次只有 1 个 Slave 进行全量同步（SYNC），其余 Slave 排队等待。
# 原因：全量同步会占用大量网络带宽和 CPU，并发同步会拖垮新晋升的 Master。
sentinel parallel-syncs mymaster 1
