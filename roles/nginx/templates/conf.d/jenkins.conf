# jenkins.jjmstart.com - Jenkins 反向代理

# HTTP 统一跳转 HTTPS
server {
    listen 80;
    server_name jenkins.jjmstart.com www.jenkins.jjmstart.com;

    return 301 https://$host$request_uri;
}

# HTTPS 入口
server {
    listen 443 ssl;
    server_name jenkins.jjmstart.com www.jenkins.jjmstart.com;

    # 处理纯 HTTP 误打到 443 SSL 端口的请求
    error_page 497 =301 https://$http_host$request_uri;

    # TLS 证书由 Ansible 挂载到容器内
    ssl_certificate /etc/nginx/ssl/jenkins.pem;
    ssl_certificate_key /etc/nginx/ssl/jenkins.key;

    # TLS 会话与加密套件策略
    ssl_session_timeout 5m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:HIGH:!aNULL:!MD5:!RC4:!DHE;
    ssl_prefer_server_ciphers on;

    # Jenkins 实时日志和部分 UI 功能依赖 WebSocket
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    # 转发到 Jenkins 服务
    location / {
        proxy_pass http://{{ jenkins_host }}:8080;

        # 保留原始访问域名、客户端 IP 与协议
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 避免 Jenkins 将浏览器重定向到内部地址
        proxy_redirect http://{{ jenkins_host }}:8080 https://jenkins.jjmstart.com;
    }
}
