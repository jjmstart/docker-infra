# ============================================================
# Jenkins 反向代理配置
# 将 jenkins.jjmstart.com 的 HTTP/HTTPS 流量代理到容器内部
# 的 Jenkins 服务（容器名 jenkins，端口 8080）
# ============================================================

# ---------- HTTP → HTTPS 强制跳转 ----------
server {
    # 监听标准 HTTP 端口
    listen 80;

    # 匹配的域名（含 www 子域名）
    server_name jenkins.jjmstart.com www.jenkins.jjmstart.com;

    # 将所有 HTTP 请求永久重定向（301）到标准 HTTPS 端口
    # $host        : 请求中的 Host 头（不含端口）
    # $request_uri : 原始请求路径及查询字符串
    return 301 https://$host$request_uri;
}

# ---------- HTTPS 主服务 ----------
server {
    # 监听 443 端口并启用 SSL
    listen 443 ssl;

    # 匹配的域名（含 www 子域名）
    server_name jenkins.jjmstart.com www.jenkins.jjmstart.com;

    # 当客户端通过 HTTP 直接访问 443 端口时（非标准行为），
    # 返回 497 错误并重定向到正确的 HTTPS 地址
    error_page 497 =301 https://$http_host$request_uri;

    # ---------- SSL 证书配置 ----------
    # 证书公钥文件（PEM 格式，包含证书链）
    ssl_certificate /etc/nginx/ssl/jenkins.pem;
    # 证书私钥文件
    ssl_certificate_key /etc/nginx/ssl/jenkins.key;

    # ---------- SSL 会话与协议配置 ----------
    # SSL 会话缓存超时时间，复用会话可减少握手开销
    ssl_session_timeout 5m;

    # 仅允许 TLS 1.2 / 1.3，禁用存在漏洞的旧版协议（SSL 3.0、TLS 1.0/1.1）
    ssl_protocols TLSv1.2 TLSv1.3;

    # 指定允许的加密套件：
    #   ECDHE-RSA-AES128-GCM-SHA256 : 优先使用的现代套件（前向保密）
    #   HIGH    : 其他高强度套件
    #   !aNULL  : 禁止匿名认证（无身份验证）
    #   !MD5    : 禁止 MD5（已破解）
    #   !RC4    : 禁止 RC4（存在漏洞）
    #   !DHE    : 禁止普通 DHE（性能差且易受 Logjam 攻击）
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:HIGH:!aNULL:!MD5:!RC4:!DHE;

    # 优先使用服务器端定义的加密套件顺序，而非客户端偏好
    ssl_prefer_server_ciphers on;

    # ---------- WebSocket 支持 ----------
    # Jenkins 构建日志实时输出、Blue Ocean 流水线视图等功能依赖 WebSocket
    # 升级到 HTTP/1.1 以支持 Upgrade 机制（HTTP/1.0 不支持）
    proxy_http_version 1.1;
    # 传递 WebSocket 升级请求头
    proxy_set_header Upgrade $http_upgrade;
    # 根据客户端请求决定是否保持长连接（WebSocket 升级时值为 "upgrade"）
    proxy_set_header Connection "upgrade";

    # ---------- 反向代理规则 ----------
    location / {
        # 将请求转发到 Docker 网络内的 Jenkins 容器（服务名:端口）
        # Jenkins 在 bj-01 上，通过 Tailscale 内网访问。
        proxy_pass http://{{ bj_01_ip }}:8080;

        # 传递原始 Host 头（含端口），确保 Jenkins 生成正确的绝对 URL
        proxy_set_header Host $http_host;

        # 传递客户端真实 IP，用于 Jenkins 访问日志与安全审计
        proxy_set_header X-Real-IP $remote_addr;

        # 传递完整的客户端 IP 链，支持经过多层代理的场景
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # 告知 Jenkins 当前使用的协议（https），
        # 使 Jenkins 在生成重定向或绝对链接时使用正确的协议头
        proxy_set_header X-Forwarded-Proto $scheme;

        # 将 Jenkins 后端返回的 Location 重定向头中的内部地址
        # 替换为对外暴露的完整公网地址，避免浏览器跳转到内部地址
        proxy_redirect http://{{ bj_01_ip }}:8080 https://jenkins.jjmstart.com;
    }
}
