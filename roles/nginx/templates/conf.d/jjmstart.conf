# ============================================================
# jjmstart.com —— 个人主站 静态网站配置
#
# 与其他 .conf 不同，这个站点不做反向代理，
# 而是直接由 Nginx 托管静态 HTML/CSS/JS 文件。
# 整体思路：
#   1. HTTP 80 强制跳转 HTTPS
#   2. HTTPS 443 从本地磁盘目录返回静态文件
# ============================================================

# ======================== HTTP → HTTPS 跳转 ========================
server {

    # ---------- 隐藏文件保护规则 ----------
    # location ~ 正则表达式 ：使用正则匹配 URI。
    # ~ 表示区分大小写的正则匹配。
    # /\. 匹配路径中以点开头的资源（如 /.git、/.env、/.htaccess）。
    # 这些通常是敏感的配置文件或版本控制目录，绝不应该对外暴露。
    location ~/\. {
        # deny all：拒绝所有请求，返回 403 Forbidden。
        deny all;

        # access_log off：不记录这些被拒绝请求的访问日志，减少噪音。
        access_log off;

        # log_not_found off：当请求的文件不存在时，不在 error_log 中记录
        # "file not found" 警告（这类扫描请求极多，会刷屏日志）。
        log_not_found off;
    }

    listen 80;

    # server_name 可以写多个域名，空格分隔。
    # 这里同时匹配裸域名和 www 子域名。
    server_name jjmstart.com www.jjmstart.com;

    return 301 https://$host:8443$request_uri;
}

# ======================== HTTPS 主配置 ========================
server {
    listen 443 ssl;
    server_name jjmstart.com www.jjmstart.com;

    error_page 497 =301 https://$http_host$request_uri;

    # ---------- SSL 证书 ----------
    ssl_certificate /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/cert.key;

    # ---------- 静态文件根目录 ----------
    # root：指定网站文件存放的根目录（容器内的路径）。
    # 当请求 /about.html 时，Nginx 会在 /var/www/html/about.html 查找文件。
    root /var/www/html;

    # index：当请求的是目录（如 /）时，自动查找并返回的默认文件名。
    # Nginx 按从左到右的顺序尝试，找到第一个存在的就返回。
    #   1. index.html       —— 最常见的默认首页
    #   2. index.htm        —— 兼容旧式文件名
    #   3. index.nginx-debian.html —— Nginx Debian/Ubuntu 安装后的默认欢迎页
    index index.html index.htm index.nginx-debian.html;

    # ---------- 隐藏文件保护（与 HTTP 块相同） ----------
    location ~/\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ---------- root 与 alias 的区别演示 ----------

    # 【root 方式】请求 /app1/page.html 时：
    #   Nginx 将 root + 完整 URI 拼接 → /var/www/html/app1/page.html
    #   即 root 是"把 URI 整体追加到目录后面"。
    location /app1/ {
        root /var/www/html;
    }

    # 【alias 方式】请求 /app2/page.html 时：
    #   Nginx 将 URI 中匹配 location 的部分（/app2/）替换为 alias 路径
    #   → /var/www/html/page.html （注意：/app2/ 被去掉了！）
    #   即 alias 是"把 location 前缀替换成指定目录"。
    #
    # 总结：root 拼接完整 URI，alias 替换 location 前缀。
    # 如果 location 与目录结构一致，用 root；否则用 alias 做路径映射。
    location /app2/ {
        alias /var/www/html;
    }

    # ---------- 默认请求处理 ----------
    location / {
        # try_files：按顺序尝试查找文件，找到第一个存在的就返回。
        #   $uri      —— 把 URI 当作文件查找，如 /about.html → /var/www/html/about.html
        #   $uri/     —— 把 URI 当作目录查找（配合 index 指令返回默认文件）
        #   =404      —— 如果以上都找不到，返回 404 Not Found
        # 这是静态网站最常用的配置模式。
        try_files $uri $uri/ =404;
    }
}
