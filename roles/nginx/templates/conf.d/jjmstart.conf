# jjmstart.com - 个人主站静态网站

# HTTP 统一跳转 HTTPS
server {

    # 禁止访问 .git / .env 等隐藏文件
    location ~/\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    listen 80;
    server_name jjmstart.com www.jjmstart.com;

    return 301 https://$host$request_uri;
}

# HTTPS 静态站点入口
server {
    listen 443 ssl;
    server_name jjmstart.com www.jjmstart.com;

    error_page 497 =301 https://$http_host$request_uri;

    # TLS 证书由 Ansible 挂载到容器内
    ssl_certificate /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/cert.key;

    # 主站静态文件目录，宿主机 ./html 挂载到容器内 /var/www/html
    root /var/www/html;

    index index.html index.htm index.nginx-debian.html;

    # 禁止访问 .git / .env 等隐藏文件
    location ~/\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # root 会把完整 URI 拼接到指定目录后
    location /app1/ {
        root /var/www/html;
    }

    # alias 会用指定目录替换 location 前缀
    location /app2/ {
        alias /var/www/html;
    }

    # 默认按静态文件或目录查找，找不到返回 404
    location / {
        try_files $uri $uri/ =404;
    }
}
