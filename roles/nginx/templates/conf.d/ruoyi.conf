# ruoyi.jjmstart.com - 若依管理系统入口

# 后端实例来自 app_nodes 分组，默认按轮询负载均衡
upstream ruoyi_backend {
{% for host in groups['app_nodes'] %}
    server {{ hostvars[host].ansible_host }}:{{ ruoyi_port }}; # {{ host }} {{ hostvars[host].ruoyi_instance }}
{% endfor %}
}

# HTTP 统一跳转 HTTPS
server {
    listen       80;
    server_name  ruoyi.jjmstart.com;
    return 301 https://$host$request_uri;
}

# HTTPS 入口
server {
    listen 443 ssl;
    server_name ruoyi.jjmstart.com;

    # TLS 证书由 Ansible 挂载到容器内
    ssl_certificate /etc/nginx/ssl/ruoyi.pem;
    ssl_certificate_key /etc/nginx/ssl/ruoyi.key;

    # 前端 Vue 静态文件由 Nginx 直接返回
    location / {
        root   /usr/share/nginx/ruoyi;

        index  index.html index.htm;

        # Vue Router History 模式刷新页面时回退到 index.html
        try_files $uri $uri/ /index.html;
    }

    # 后端 API 请求转发给 Java 服务
    location /prod-api/ {
        # 保留原始访问域名和客户端 IP
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header REMOTE-HOST $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # 末尾 / 会去掉 /prod-api/ 前缀，后端收到 /system/user 这类真实接口路径
        proxy_pass http://ruoyi_backend/;
    }
}
