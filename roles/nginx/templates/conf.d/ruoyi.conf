# ============================================================
# ruoyi.jjmstart.com —— 若依管理系统 反向代理配置
#
# 这个配置综合运用了 Nginx 的几个核心功能：
#   1. upstream   —— 负载均衡：将流量分发到多个后端 Java 实例
#   2. 动静分离   —— 前端 Vue 静态文件由 Nginx 直接返回（不经过 Java）
#   3. 反向代理   —— API 请求转发给后端 Java 服务处理
# ============================================================

# ======================== 负载均衡（上游服务器组） ========================
# upstream：定义一组后端服务器，作为反向代理的目标。
# "ruoyi_backend" 是自定义名称，后面 proxy_pass 引用它时使用。
# Nginx 会在这些服务器之间做负载均衡。
#
# 默认算法是 round-robin（轮询）：请求 1 → server1，请求 2 → server2，
# 请求 3 → server1 ……依次循环。
# 其他可选算法：
#   least_conn;      —— 优先转发给当前连接数最少的服务器
#   ip_hash;         —— 按客户端 IP 哈希，同一 IP 固定打到同一后端（适合有状态会话）
#   weight=N;        —— 加权轮询，如 server A weight=3; server B weight=1; → A 收到 75% 流量
upstream ruoyi_backend {
    # 两个后端实例分布在不同服务器，通过 Tailscale 内网互联，不再使用 Docker DNS。
    # bj-01 上的 Nginx 通过 Tailscale WireGuard 隧道将请求转发到广州两节点。
    # 同城延迟约 35ms（bj-01 → gz），业务层面无感知。
    server {{ gz_03_ip }}:8080;   # gz-03（广州·火山引擎）ruoyi-admin-1
    server {{ gz_02_ip }}:8080; # gz-02（广州·腾讯云）  ruoyi-admin-2
}

# ======================== HTTP → HTTPS 跳转 ========================
server {
    listen       80;
    server_name  ruoyi.jjmstart.com;
    return 301 https://$host$request_uri;
}

# ======================== HTTPS 主配置 ========================
server {
    listen 443 ssl;
    server_name ruoyi.jjmstart.com;

    # ---------- SSL 证书 ----------
    ssl_certificate /etc/nginx/ssl/ruoyi.pem;
    ssl_certificate_key /etc/nginx/ssl/ruoyi.key;

    # ==========================================
    # 1. 动静分离：前端静态文件由 Nginx 直接返回
    # ==========================================
    # 所谓"动静分离"：
    #   静态资源（HTML/CSS/JS/图片）—— Nginx 擅长，直接从磁盘读取返回，极快
    #   动态请求（API 调用）       —— 需要 Java 业务逻辑处理，交给后端
    # 这样 Java 不需要处理静态文件请求，性能更好。

    location / {
        # root：静态文件的存放目录（容器内路径）。
        # 通过 docker-compose volumes 将宿主机的 Vue 打包产物挂载到此目录。
        root   /usr/share/nginx/ruoyi;

        # index：访问 / 时默认返回 index.html。
        index  index.html index.htm;

        # try_files：Vue 单页应用（SPA）必备配置！
        # Vue Router 使用 HTML5 History 模式时，URL 是 /system/user 这样的路径，
        # 但实际上服务器磁盘上并没有 /system/user 这个文件或目录。
        # try_files 的查找顺序：
        #   $uri      —— 先当文件查（如 /css/app.css 确实存在就直接返回）
        #   $uri/     —— 再当目录查（配合 index 返回目录下的默认文件）
        #   /index.html —— 都找不到就回退到 index.html，让 Vue Router 在浏览器端接管路由
        # 如果不加这条，刷新页面就会 404！
        try_files $uri $uri/ /index.html;
    }

    # ==========================================
    # 2. 反向代理：后端 API 请求转发给 Java
    # ==========================================

    # location /prod-api/：前缀匹配，所有以 /prod-api/ 开头的请求进入此规则。
    # Vue 前端打包时配置了统一的 API 前缀 /prod-api，
    # 所有 axios 请求都类似 /prod-api/system/user/list。
    location /prod-api/ {
        # 传递原始域名（含端口），后端可据此生成正确的响应链接。
        proxy_set_header Host $http_host;

        # 传递客户端真实 IP。
        proxy_set_header X-Real-IP $remote_addr;

        # REMOTE-HOST：若依框架自定义读取的请求头，用于获取客户端 IP。
        proxy_set_header REMOTE-HOST $remote_addr;

        # 传递完整代理 IP 链。
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # proxy_pass http://ruoyi_backend/;
        # 注意末尾的 / 非常关键！它决定了 URI 的改写行为：
        #
        # 【有斜杠】proxy_pass http://ruoyi_backend/;
        #   请求 /prod-api/system/user → 转发为 /system/user
        #   location 前缀 "/prod-api/" 被替换为 proxy_pass 末尾的 "/"
        #   效果：去掉了 /prod-api 前缀，Java 后端收到的是 /system/user
        #
        # 【无斜杠】proxy_pass http://ruoyi_backend;
        #   请求 /prod-api/system/user → 转发为 /prod-api/system/user
        #   URI 原样保留，Java 后端收到的仍然带 /prod-api 前缀
        #
        # 因为 Java 后端的接口路径是 /system/user（不含 /prod-api），
        # 所以这里必须带末尾斜杠来去掉前缀。
        proxy_pass http://ruoyi_backend/;
    }
}
