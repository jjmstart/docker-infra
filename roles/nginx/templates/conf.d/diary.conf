# diary.jjmstart.com —— Memos 日记应用反向代理

# HTTP 统一跳转 HTTPS
server {
    listen 80;
    server_name diary.jjmstart.com;
    client_max_body_size 50M;

    return 301 https://$host$request_uri;
}

# HTTPS 入口
server {
    listen 443 ssl;

    server_name diary.jjmstart.com;
    client_max_body_size 50M;

    # TLS 证书由 Ansible 挂载到容器内
    ssl_certificate /etc/nginx/ssl/diary.pem;
    ssl_certificate_key /etc/nginx/ssl/diary.key;

    # 替换 Memos 默认 Logo / Favicon
    location = /logo.webp {
        return 301 https://jjmstart.com/img/memos_icon.png;
    }

    location = /favicon.ico {
        return 301 https://jjmstart.com/img/memos_icon.png;
    }

    location = /favicon.svg {
        return 301 https://jjmstart.com/img/memos_icon.png;
    }

    # 其余请求转发到 bj-01 上的 Memos 服务
    location / {
        proxy_pass http://{{ diary_host }}:5230;

        # 保留原始访问域名、客户端 IP 与协议，避免后端生成错误链接
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
