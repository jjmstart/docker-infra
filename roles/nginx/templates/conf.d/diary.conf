# ============================================================
# diary.jjmstart.com —— Memos 日记应用 反向代理配置
#
# 整体思路：
#   1. 第一个 server 块监听 HTTP 80 端口，将所有请求 301 跳转到 HTTPS
#   2. 第二个 server 块监听 HTTPS 443 端口，做三件事：
#      a) 把几个静态资源（Logo / Favicon）重定向到自定义图片
#      b) 其余所有请求反向代理到后端 Memos 容器
# ============================================================

# ======================== HTTP → HTTPS 跳转 ========================
server {
    # listen：声明此 server 块监听的端口。
    # 80 是 HTTP 的默认端口，浏览器访问 http://xxx 时连接到这里。
    listen 80;

    # server_name：匹配的域名。
    # 当请求的 Host 头等于 diary.jjmstart.com 时，由此 server 块处理。
    server_name diary.jjmstart.com;

    # client_max_body_size：允许客户端上传的最大请求体大小。
    # Memos 支持上传图片/附件，默认值仅 1M，这里放宽到 50M。
    # 超过此值 Nginx 会直接返回 413 (Request Entity Too Large)。
    client_max_body_size 50M;

    return 301 https://$host$request_uri;
}

# ======================== HTTPS 主配置 ========================
server {
    # listen 443 ssl：监听 443 端口并启用 SSL/TLS 加密。
    # 443 是 HTTPS 的默认端口，浏览器访问 https://xxx 时连接到这里。
    listen 443 ssl;

    server_name diary.jjmstart.com;
    client_max_body_size 50M;

    # ---------- SSL 证书配置 ----------
    # ssl_certificate    ：证书公钥文件（PEM 格式），由 CA 签发，包含域名、公钥、证书链。
    # ssl_certificate_key：证书私钥文件，与公钥配对，Nginx 用它完成 TLS 握手。
    # 两者路径指向容器内的挂载位置（通过 docker-compose volumes 映射进来）。
    ssl_certificate /etc/nginx/ssl/diary.pem;
    ssl_certificate_key /etc/nginx/ssl/diary.key;

    # ==========================================
    # 静态资源重定向规则
    # ==========================================
    # Memos 默认的 Logo 和 Favicon 无法直接在配置中修改，
    # 这里用 Nginx 把对这些固定路径的请求 301 到自定义图片。

    # location = /path ：精确匹配（Exact Match），
    # 仅当 URI 完全等于 /logo.webp 时才命中，其他路径不受影响。
    # 这是 Nginx 中优先级最高的匹配方式。
    location = /logo.webp {
        return 301 https://jjmstart.com/img/memos_icon.png;
    }

    # 浏览器标签页小图标（.ico 格式）
    location = /favicon.ico {
        return 301 https://jjmstart.com/img/memos_icon.png;
    }

    # 部分新版浏览器会请求 SVG 格式的 Favicon，一并重定向
    location = /favicon.svg {
        return 301 https://jjmstart.com/img/memos_icon.png;
    }

    # ==========================================
    # 反向代理：把所有请求转发给 Memos 容器
    # ==========================================

    # location /：前缀匹配，/ 是最宽泛的规则——
    # 当没有其他 location 能匹配时（如上面的精确匹配），请求落到这里。
    location / {
        # ----- 以下是被注释掉的限流配置，保留供以后启用 -----
        # limit_req zone=mylimit burst=5 nodelay;
        #   zone=mylimit  —— 引用在 nginx.conf 主配置中用 limit_req_zone 定义的限流桶
        #   burst=5       —— 允许瞬间突发 5 个额外请求排队，不立刻拒绝
        #   nodelay       —— 突发请求立即处理（不排队等待），但超出 burst 的直接返回 503

        # proxy_pass：反向代理的核心指令。
        # 将当前请求完整转发到指定的后端地址。
        # "diary" 是 Docker Compose 中 Memos 容器的服务名，
        # Docker 内部 DNS 会自动将它解析为容器 IP。
        # :5230 是 Memos 监听的端口。
        # Memos 在 bj-01 上，通过 Tailscale 内网访问。
        proxy_pass http://{{ bj_01_ip }}:5230;

        # ---------- 传递请求头 ----------
        # 反向代理默认会丢失原始请求的部分信息，
        # 以下 proxy_set_header 将关键信息透传给后端：

        # Host：原始域名（diary.jjmstart.com），
        # 后端可据此判断请求来自哪个虚拟主机。
        proxy_set_header Host $host;

        # X-Real-IP：客户端的真实 IP 地址。
        # 经过代理后，后端看到的 IP 是 Nginx 容器的 IP，
        # 这个头让后端能获取到真正的用户 IP。
        proxy_set_header X-Real-IP $remote_addr;

        # X-Forwarded-For：记录请求经过的所有代理 IP 链。
        # $proxy_add_x_forwarded_for 会自动在已有链后追加当前客户端 IP。
        # 多层代理时（CDN → Nginx → 后端），这条链路会越来越长。
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # X-Forwarded-Proto：告知后端当前使用的协议（http 或 https）。
        # $scheme 变量的值就是 "https"（因为此 server 块监听的是 443 ssl）。
        # 后端据此决定生成链接时用 http:// 还是 https://。
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
