# monitor.jjmstart.com - Grafana 反向代理

# HTTP 统一跳转 HTTPS
server {
    listen 80;
    server_name monitor.jjmstart.com;

    return 301 https://$host$request_uri;
}

# HTTPS 入口
server {
    listen 443 ssl;
    server_name monitor.jjmstart.com;

    # 处理纯 HTTP 误打到 443 SSL 端口的请求
    error_page 497 =301 https://$http_host$request_uri;

    # TLS 证书由 Ansible 挂载到容器内
    ssl_certificate /etc/nginx/ssl/monitor.pem;
    ssl_certificate_key /etc/nginx/ssl/monitor.key;

    # TLS 会话与加密套件策略
    ssl_session_timeout 5m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:HIGH:!aNULL:!MD5:!RC4:!DHE;
    ssl_prefer_server_ciphers on;

    # 转发到 Grafana 服务
    location / {
        proxy_pass http://{{ grafana_host }}:3000;

        # 保留原始访问域名、客户端 IP 与协议
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
