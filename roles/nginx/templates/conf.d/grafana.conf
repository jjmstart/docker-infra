# ============================================================
# monitor.jjmstart.com —— Grafana 监控面板 反向代理配置
#
# 特殊之处：HTTPS 对外暴露的端口不是标准 443，而是 8443。
# 这是因为宿主机的 443 已被主站占用，所以 docker-compose 中
# 把容器的 443 映射到了宿主机的 8443 端口。
# 因此访问地址是：https://monitor.jjmstart.com:8443
# ============================================================

# ======================== HTTP → HTTPS 跳转 ========================
server {
    listen 80;
    server_name monitor.jjmstart.com;

    # 注意这里跳转目标带了 :8443 端口号。
    # 因为 HTTPS 不是走标准 443，浏览器不会自动补端口，
    # 必须显式指定，否则浏览器会尝试连接 443 而失败。
    return 301 https://$host:8443$request_uri;
}

# ======================== HTTPS 主配置 ========================
server {
    listen 443 ssl;
    server_name monitor.jjmstart.com;

    # ---------- 处理 HTTP 误打到 SSL 端口的情况 ----------
    # error_page 497：当客户端用纯 HTTP 协议请求 SSL 端口时，
    # Nginx 会产生 497 错误（非标准状态码，Nginx 专用）。
    # 这里捕获 497 并将其转为 301 重定向到正确的 HTTPS 地址。
    # 典型场景：用户在浏览器输入 monitor.jjmstart.com:8443，
    # 浏览器默认用 HTTP 去连接，打到了 SSL 端口，触发 497。
    # $http_host 包含域名和端口（monitor.jjmstart.com:8443），
    # 比 $host（仅含域名）更适合此场景。
    error_page 497 =301 https://$http_host$request_uri;

    # ---------- SSL 证书 ----------
    ssl_certificate /etc/nginx/ssl/monitor.pem;
    ssl_certificate_key /etc/nginx/ssl/monitor.key;

    # ---------- SSL 安全参数 ----------

    # ssl_session_timeout：SSL 会话复用的超时时间。
    # 同一客户端在 5 分钟内再次连接时，可跳过完整 TLS 握手（省一个 RTT），
    # 减少 CPU 开销和连接延迟。
    ssl_session_timeout 5m;

    # ssl_protocols：允许使用的 TLS 协议版本。
    # 只启用 TLSv1.2 和 TLSv1.3，禁用存在已知漏洞的旧版本：
    #   SSL 3.0  → POODLE 攻击
    #   TLS 1.0  → BEAST 攻击
    #   TLS 1.1  → 已被各大浏览器弃用
    ssl_protocols TLSv1.2 TLSv1.3;

    # ssl_ciphers：允许的加密算法套件，按优先级从左到右排列。
    #   ECDHE-RSA-AES128-GCM-SHA256 —— 推荐首选：椭圆曲线密钥交换 + AES-GCM，
    #                                   支持前向保密（Perfect Forward Secrecy）
    #   HIGH   —— OpenSSL 定义的"高强度"套件集合
    #   !aNULL  —— 排除"无认证"套件（门户大开，中间人随便攻击）
    #   !MD5    —— 排除 MD5（已被碰撞攻击破解）
    #   !RC4    —— 排除 RC4（多个已知漏洞）
    #   !DHE    —— 排除传统 Diffie-Hellman（性能差，易受 Logjam 攻击）
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:HIGH:!aNULL:!MD5:!RC4:!DHE;

    # ssl_prefer_server_ciphers：TLS 握手时优先使用服务器端指定的加密套件顺序。
    # 如果关闭（off），则由客户端决定使用哪个套件——
    # 老旧客户端可能选择不安全的套件，所以生产环境建议开启。
    ssl_prefer_server_ciphers on;

    # ======================== 反向代理 ========================
    location / {
        # 将请求转发到 Docker 内部的 Grafana 容器。
        # "grafana" 是 docker-compose 中的服务名，Docker DNS 自动解析。
        # :3000 是 Grafana 默认监听的端口。
        # Grafana 在 bj-01 上，通过 Tailscale 内网访问。
        proxy_pass http://{{ gz_01_ip }}:3000;

        # 传递原始域名，Grafana 用它生成页面中的绝对链接。
        proxy_set_header Host $host;

        # 传递客户端真实 IP（否则 Grafana 日志里只能看到 Nginx 容器的 IP）。
        proxy_set_header X-Real-IP $remote_addr;

        # 记录经过的所有代理 IP 链，多层代理场景下有用。
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # 告诉 Grafana 前端是 HTTPS 访问的。
        # Grafana 会根据此值决定 Cookie 是否设置 Secure 标志等安全策略。
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
