---
- name: Ensure node-exporter directory exists
  ansible.builtin.file:
    path: "{{ docker_root }}/node-exporter"
    state: directory
    mode: "0755"

- name: Render node exporter compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ docker_root }}/node-exporter/docker-compose.yml"
    mode: "0644"
  notify: restart node-exporter

- name: Ensure node exporter stack is running
  community.docker.docker_compose_v2:
    project_src: "{{ docker_root }}/node-exporter"
    state: present
    recreate: auto
  when: not ansible_check_mode