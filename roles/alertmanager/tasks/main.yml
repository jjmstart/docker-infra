---
- name: Ensure alertmanager directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ docker_root }}/monitor/alertmanager"
    - "{{ docker_root }}/monitor/alertmanager/data"

- name: Render prometheus-alert feishu template
  ansible.builtin.copy:
    src: prometheus-fs.tpl
    dest: "{{ docker_root }}/monitor/alertmanager/prometheus-fs.tpl"
    mode: "0644"
  notify: restart alertmanager stack

- name: Render alertmanager compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ docker_root }}/monitor/alertmanager/docker-compose.yml"
    mode: "0644"
  notify: restart alertmanager stack

- name: Render alertmanager config
  ansible.builtin.template:
    src: alertmanager.yml.j2
    dest: "{{ docker_root }}/monitor/alertmanager/alertmanager.yml"
    mode: "0644"
  notify: restart alertmanager stack

# 确保 alertmanager stack 已启动并应用最新配置
- name: Apply pending alertmanager stack changes
  ansible.builtin.meta: flush_handlers

# 将 prometheus-alert feishu template 写入运行时 DB
- name: Apply prometheus-alert feishu template to runtime DB
  ansible.builtin.shell:
    cmd: |
      set -euo pipefail
      docker exec prometheus-alert sh -c 'sqlite3 /app/db/PrometheusAlertDB.db "update prometheus_alert_d_b set tpl = readfile('\'/app/prometheus-fs.tpl\'') where tplname = '\''prometheus-fs'\'';"'
    executable: /bin/bash
  changed_when: false