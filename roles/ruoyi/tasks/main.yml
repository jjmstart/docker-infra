---
- name: Ensure Ruoyi directory exists
  ansible.builtin.file:
    path: "{{ docker_root }}/backend/ruoyi"
    state: directory
    mode: "0755"

- name: Render Ruoyi env file
  ansible.builtin.template:
    src: .env.j2
    dest: "{{ docker_root }}/backend/ruoyi/.env"
    mode: "0600"
  notify: restart ruoyi

- name: Render Ruoyi compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ docker_root }}/backend/ruoyi/docker-compose.yml"
    mode: "0644"
  notify: restart ruoyi
