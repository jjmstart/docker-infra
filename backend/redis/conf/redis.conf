# =============================================================
# Redis 配置文件 - Master 主节点
# 节点：ops-lab-gz-03（广州·腾讯云 4C8G）
# 角色：接受所有写操作，将数据实时同步给两个 Slave
# 集群：gz-03(Master) → gz-02(Slave1·同城) → bj-01(Slave2·异地)
# 适用版本：Redis 7.x
# =============================================================


# ── 网络 ──────────────────────────────────────────────────────
# bind 0.0.0.0：容器内监听所有网卡。
# 容器内部的网卡地址是 Docker 分配的（如 172.17.0.x），
# 必须监听 0.0.0.0 才能接受来自 Docker 桥接网络的连接（如 Ruoyi 容器）。
# 宿主机层面的访问控制由 docker-compose.yml 的 ports 绑定实现：
# 只将端口暴露在 127.0.0.1 和 Tailscale IP 上，公网 IP 不可达。
bind 0.0.0.0

# protected-mode no：关闭 Redis 自我保护模式。
# protected-mode 的触发条件是：未设置密码 且 bind 为 0.0.0.0。
# 我们已通过 --requirepass 设置了密码，关闭此模式避免与密码认证冲突。
protected-mode no

# port 6379：Redis 默认监听端口，容器内端口，宿主机通过 ports 映射对外暴露。
port 6379

# replica-announce-ip：主动向 Master（或 Sentinel）声明本节点对外可达的 IP。
# 问题背景：Redis 默认上报的是容器内网卡 IP（172.17.0.x），
# 其他服务器的 Slave/Sentinel 无法通过这个 IP 访问到本容器。
# 解决方案：声明 Tailscale 内网 IP，让 Sentinel 知道该通过哪个地址访问本节点。
# 注意：作为 Master，此配置用于 Slave 向 Sentinel 汇报本节点地址时的参考值。
replica-announce-ip 100.92.5.116
replica-announce-port 6379


# ── 认证 ──────────────────────────────────────────────────────
# requirepass（连接密码）和 masterauth（Slave 连接 Master 的密码）
# 均通过 docker-compose.yml 的 command 参数注入，原因：
# 1. redis.conf 是普通文件，密码若写死在此处会以明文存在，存在 git 误提交风险。
# 2. 通过 .env 文件 + 命令行参数注入，密码集中管理，且命令行参数优先级高于配置文件。
# masterauth 的作用：当本 Master 节点在故障恢复后以 Slave 身份重新加入集群时，
# 需要用 masterauth 向新 Master 进行身份认证，所以 Master 也必须配置此项。


# ── 内存管理（软限制）─────────────────────────────────────────
# maxmemory：Redis 进程可使用的最大内存（软限制）。
# 超出后按 maxmemory-policy 策略淘汰 key，不会无限扩张吃光宿主机内存。
# gz-03 为 8G 内存，分配 512mb 给 Redis，预留资源给 OS 和其他服务。
# Docker deploy.resources.limits.memory 是硬限制（由 cgroups 强制执行），
# 设为 768m（maxmemory 的 1.5 倍），预留 AOF 缓冲区、连接等开销。
maxmemory 512mb

# maxmemory-policy：内存达到上限时的 key 淘汰策略。
#   allkeys-lru   ：从所有 key 中淘汰最近最少使用的（最适合纯缓存场景）
#   volatile-lru  ：只淘汰设置了过期时间的 key（适合混合存储，会话不丢）
#   noeviction    ：不淘汰，写入直接报错（适合数据不可丢失的场景）
# 若依项目的 Redis 存储了 login_tokens（用户登录会话），若对会话稳定性要求高，
# 可改为 volatile-lru（只淘汰有过期时间的缓存 key，保留永久 key）。
maxmemory-policy allkeys-lru


# ── AOF 持久化 ────────────────────────────────────────────────
# appendonly yes：开启 AOF（Append Only File）持久化。
# 每条写命令都追加到 AOF 日志，重启时重放日志恢复数据。
# 对比 RDB 快照（周期性全量备份，宕机可能丢失两次快照间所有数据），
# AOF 最多丢失 1 秒数据，更适合对数据完整性有要求的业务场景。
appendonly yes

# appendfsync everysec：AOF 刷盘策略。
#   always   ：每条命令立即刷盘，最安全，性能损耗最大
#   everysec ：每秒刷盘一次，最多丢失 1 秒数据，性能与安全的最佳折中（推荐）
#   no       ：由 OS 决定何时刷盘，性能最高，宕机可能丢失较多数据
appendfsync everysec

# aof-use-rdb-preamble yes：开启混合持久化（Redis 5.0+ 引入，7.x 默认开启）。
# AOF 文件结构 = RDB 快照（头部，加载速度快）+ 增量 AOF 命令（尾部，数据完整）。
# 重启恢复时先用 RDB 快速加载大部分数据，再重放少量增量命令，兼顾速度与完整性。
aof-use-rdb-preamble yes
